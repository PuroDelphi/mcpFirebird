version: '3.8'

services:
  # Firebird database server
  firebird-db:
    image: jacobalberty/firebird:3.0
    environment:
      ISC_PASSWORD: masterkey
      FIREBIRD_DATABASE: database.fdb
      FIREBIRD_USER: SYSDBA
      # For native driver compatibility with modern Node apps, we often disable wirecrypt on the server
      # Or you can enable it and the native driver will connect securely.
      FIREBIRD_CONF_WireCrypt: Disabled
    volumes:
      - firebird-data:/firebird/data
    ports:
      - "3050:3050"
    networks:
      - mcp-network

  # MCP Firebird server with Unified Transport (Streamable HTTP & SSE)
  mcp-firebird:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      FIREBIRD_HOST: firebird-db
      FIREBIRD_PORT: 3050
      FIREBIRD_USER: SYSDBA
      FIREBIRD_PASSWORD: masterkey
      FIREBIRD_DATABASE: /firebird/data/database.fdb
      # Use EMA (Enterprise Managed Authorization) to protect access
      FIREBIRD_API_KEY: my_secure_token_123
      # We recommend HTTP Streamable as the standard modern transport
      TRANSPORT_TYPE: http
      HTTP_PORT: 3003
      
      # HTTP Streamable configuration
      STREAMABLE_STATELESS_MODE: "true"
      STREAMABLE_SESSION_TIMEOUT_MS: 1800000
      
      # Security configuration
      SECURITY_CONFIG_PATH: ""
      
      # Advanced configuration
      FIREBIRD_WIRECRYPT: Disabled
      USE_NATIVE_DRIVER: "false"
      PAGE_SIZE: 100
      QUERY_TIMEOUT: 30000
      MAX_CONNECTIONS: 50
      
      # Logging and legacy features
      LOG_LEVEL: debug
      SSE_PORT: 3012
      SSE_SESSION_TIMEOUT_MS: 1800000
    ports:
      - "3003:3003"
    depends_on:
      - firebird-db
    networks:
      - mcp-network
    # Add healthcheck to ensure the server is running properly
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  mcp-network:
    driver: bridge

volumes:
  firebird-data:
